version: 2.1

orbs:
  gem-tool: appfolio/gem-tool@volatile

workflows:
  rc:
    jobs:
      - gem-tool/rake_test:
          name: test_ruby-<< matrix.ruby_version >>
          context: appfolio_test_context
          executor_tag: ruby
          gem_name: 'swagger/blocks'
          matrix:
            parameters:
              ruby_version:
                - '3.3.10'
                - '3.4.8'
                - '4.0.1'
